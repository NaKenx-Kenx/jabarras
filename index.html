<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JABARRAS - VHS Link Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f4f4f4;
            --cyan: #0ff;
            --red: #f00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Scrollbar styling agar tidak mengganggu tema (untuk desktop) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--text-color); }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'VT323', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            padding: 20px 0;
        }

        /* --- Efek Analog VHS --- */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none; /* Membiarkan kita tetap bisa mengklik video */
            z-index: 100;
        }

        .screen-flicker {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.02);
            opacity: 0;
            pointer-events: none;
            animation: flicker 0.15s infinite;
            z-index: 99;
        }

        @keyframes flicker {
            0% { opacity: 0.05; }
            50% { opacity: 0.01; }
            100% { opacity: 0.08; }
        }

        /* --- Layout --- */
        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        /* On-Screen Display (OSD) ala VCR */
        .osd {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px var(--red), -2px -2px 0px var(--cyan);
        }

        .osd.bottom {
            margin-bottom: 0;
            margin-top: 40px;
        }

        .play-text {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Profile & Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            position: relative;
            display: inline-block;
            text-shadow: 2px 0 0 var(--red), -2px 0 0 var(--cyan);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 2px 0 0 var(--red), -2px 0 0 var(--cyan); transform: translate(0); }
            20% { text-shadow: 2px 0 0 var(--red), -2px 0 0 var(--cyan); transform: translate(0); }
            21% { text-shadow: -2px 2px 0 var(--red), 2px -2px 0 var(--cyan); transform: translate(-2px, 2px); }
            22% { text-shadow: 2px 0 0 var(--red), -2px 0 0 var(--cyan); transform: translate(0); }
        }

        /* --- Video Embed --- */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio aspek 16:9 */
            height: 0;
            margin-bottom: 25px;
            border: 2px solid var(--text-color);
            box-shadow: 2px 2px 0px var(--red), -2px -2px 0px var(--cyan);
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
        }

        /* Links */
        .link-tree {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            text-decoration: none;
            color: var(--text-color);
            background: transparent;
            border: 2px solid var(--text-color);
            padding: 15px 20px;
            font-size: 1.8rem;
            text-align: center;
            transition: 0.2s all;
            position: relative;
            box-shadow: 2px 2px 0px var(--red), -2px -2px 0px var(--cyan);
        }

        .link-item::before {
            content: "► ";
            opacity: 0;
            transition: 0.2s;
        }

        .link-item:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 4px 4px 0px var(--red), -4px -4px 0px var(--cyan);
            text-shadow: none;
            cursor: pointer;
        }

        .link-item:hover::before {
            opacity: 1;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 3rem; }
            .link-item { font-size: 1.4rem; padding: 12px; }
            .osd { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="screen-flicker"></div>

    <div class="container">
        <div class="osd">
            <span class="play-text">PLAY ►</span>
            <span>SP <span id="counter">0:00:00</span></span>
        </div>

        <div class="header">
            <h1>JABARRAS</h1>
        </div>

        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/zW-MmVN6gxY?rel=0" 
                title="YouTube video player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="link-tree">
            <a href="https://www.youtube.com/@Jabarras-gd" target="_blank" class="link-item">YT // JABARRAS-GD</a>
            <a href="https://www.youtube.com/@Jabarras" target="_blank" class="link-item">YT // JABARRAS</a>
            <a href="https://www.tiktok.com/@jabarras_u" target="_blank" class="link-item">TK // @JABARRAS_U</a>
            <a href="https://www.tiktok.com/@jabarras" target="_blank" class="link-item">TK // @JABARRAS</a>
            <a href="https://kenx-indie-dev.itch.io/" target="_blank" class="link-item">ITCH // KENX INDIE DEV</a>
        </div>

        <div class="osd bottom">
            <span id="datetime">AM 12:00</span>
            <span>STEREO</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            document.getElementById('datetime').innerText = `${ampm} ${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        let seconds = 0;
        function updateCounter() {
            seconds++;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            
            const formattedTime = `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            document.getElementById('counter').innerText = formattedTime;
        }
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
